<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="TechNexus Farmer Management System — centralised platform for farmer registration, field visit tracking, crop monitoring, and delivery management across Malawi.">
  <meta name="author" content="TechNexus MW">
  <meta name="theme-color" content="#002050">
  <title>TFMS — TechNexus Farmer Management System</title>

  <!-- Favicon -->
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='20' fill='%2300B294'/><text x='50' y='68' font-family='Arial' font-size='48' font-weight='bold' fill='white' text-anchor='middle'>TF</text></svg>">

  <!-- Stylesheets -->
  <link rel="stylesheet" href="assets/css/tfms.css">

  <!-- React 18 + Dependencies (unpkg — official Recharts recommendation) -->
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-is@18/umd/react-is.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/prop-types@15/prop-types.min.js"></script>

  <!-- Recharts (UMD — requires react-is + prop-types above) -->
  <script crossorigin src="https://unpkg.com/recharts@2.15.0/umd/Recharts.js"></script>

  <!-- Babel Standalone (JSX compilation in browser) -->
  <script crossorigin src="https://unpkg.com/@babel/standalone@7/babel.min.js"></script>
</head>
<body>

  <!-- Loading Screen -->
  <div id="app-loader">
    <div class="loader-brand">
      <div class="loader-icon">TF</div>
      <div class="loader-text">
        <h1>TFMS</h1>
        <p>FARMER MANAGEMENT SYSTEM</p>
      </div>
    </div>
    <div class="loader-bar"><div class="loader-bar-fill"></div></div>
  </div>

  <!-- React Mount Point -->
  <div id="root"></div>

  <!-- Application loader: fetch JSX, compile with Babel, execute -->
  <script>
    (function() {
      function dismissLoader() {
        var el = document.getElementById('app-loader');
        if (el && !el.classList.contains('fade-out')) {
          el.classList.add('fade-out');
          setTimeout(function() { if (el.parentNode) el.parentNode.removeChild(el); }, 500);
        }
      }

      // Fetch JSX source, compile with Babel, inject as plain JS
      fetch('assets/js/app.jsx')
        .then(function(res) {
          if (!res.ok) throw new Error('Failed to load app.jsx: ' + res.status);
          return res.text();
        })
        .then(function(jsxCode) {
          var output = Babel.transform(jsxCode, { presets: ['react'] });
          var script = document.createElement('script');
          script.textContent = output.code;
          document.body.appendChild(script);
          // Dismiss loader shortly after React mounts
          setTimeout(dismissLoader, 300);
        })
        .catch(function(err) {
          console.error('TFMS Load Error:', err);
          // Show error on screen so it's visible during dev
          var loader = document.getElementById('app-loader');
          if (loader) {
            loader.innerHTML = '<div style="text-align:center;color:#fff;padding:40px">'
              + '<h2 style="margin-bottom:12px">TFMS Load Error</h2>'
              + '<p style="opacity:.7;font-size:13px">' + err.message + '</p>'
              + '<p style="opacity:.5;font-size:11px;margin-top:16px">Check browser console for details.</p></div>';
          }
        });
    })();
  </script>

</body>
</html>
