<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="TechNexus Farmer Management System — centralised platform for farmer registration, field visit tracking, crop monitoring, and delivery management across Malawi.">
  <meta name="author" content="TechNexus MW">
  <meta name="theme-color" content="#002050">
  <title>TFMS — TechNexus Farmer Management System</title>

  <!-- Favicon -->
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='20' fill='%2300B294'/><text x='50' y='68' font-family='Arial' font-size='48' font-weight='bold' fill='white' text-anchor='middle'>TF</text></svg>">

  <!-- Stylesheets -->
  <link rel="stylesheet" href="assets/css/tfms.css">

  <!-- React 18 (Production) -->
  <script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/react/18.3.1/umd/react.production.min.js"></script>
  <script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.3.1/umd/react-dom.production.min.js"></script>

  <!-- Recharts (Charts library) -->
  <script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/recharts/2.15.3/Recharts.min.js"></script>

  <!-- Babel Standalone (JSX compilation in browser) -->
  <script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.26.9/babel.min.js"></script>
</head>
<body>

  <!-- Loading Screen -->
  <div id="app-loader">
    <div class="loader-brand">
      <div class="loader-icon">TF</div>
      <div class="loader-text">
        <h1>TFMS</h1>
        <p>FARMER MANAGEMENT SYSTEM</p>
      </div>
    </div>
    <div class="loader-bar"><div class="loader-bar-fill"></div></div>
  </div>

  <!-- React Mount Point -->
  <div id="root"></div>

  <!-- Application -->
  <script type="text/babel" src="assets/js/app.jsx" data-type="module"></script>

  <!-- Loader dismissal (independent of Babel compilation) -->
  <script>
    (function() {
      function dismissLoader() {
        var el = document.getElementById('app-loader');
        if (el && !el.classList.contains('fade-out')) {
          el.classList.add('fade-out');
          setTimeout(function() { if (el.parentNode) el.parentNode.removeChild(el); }, 500);
        }
      }

      // Strategy 1: Watch for React rendering into #root
      var root = document.getElementById('root');
      if (root && typeof MutationObserver !== 'undefined') {
        var obs = new MutationObserver(function(mutations) {
          if (root.children.length > 0) { obs.disconnect(); setTimeout(dismissLoader, 200); }
        });
        obs.observe(root, { childList: true });
      }

      // Strategy 2: Hard failsafe — dismiss after 5 seconds no matter what
      setTimeout(dismissLoader, 5000);
    })();
  </script>

</body>
</html>
